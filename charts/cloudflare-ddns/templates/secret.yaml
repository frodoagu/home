{{- if not .Values.cloudflare.existingSecret }}
{{- if not .Values.cloudflare.apiToken }}
{{- fail "cloudflare.apiToken or cloudflare.existingSecret must be set" }}
{{- end }}
# Cloudflare API token (inline). Prefer cloudflare.existingSecret to keep the
# token out of git.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cloudflare-ddns.secretName" . }}
  labels:
    {{- include "cloudflare-ddns.labels" . | nindent 4 }}
type: Opaque
stringData:
  CLOUDFLARE_API_TOKEN: {{ .Values.cloudflare.apiToken | quote }}
{{- end }}
