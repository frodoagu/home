# Cloudflare dynamic-DNS updater (favonia/cloudflare-ddns).
# Keeps the A records below in sync with this network's public IPv4 address.

image:
  repository: favonia/cloudflare-ddns
  # Human-readable tag (used only when digest is empty). Releases:
  # https://github.com/favonia/cloudflare-ddns/releases
  tag: "latest"
  # Pin by digest for reproducible deploys (takes precedence over tag).
  # This is the digest currently running; update deliberately on upgrade.
  digest: "sha256:bc53b40b13c8b2a84e9b93c21f65fcd7d574b741014fb93912eb9efd93015aa2"
  pullPolicy: IfNotPresent

cloudflare:
  # Cloudflare API token with Zone:DNS:Edit on the agu.com.ar zone.
  # Create the secret out-of-band so the token never lives in git:
  #   kubectl create secret generic cloudflare-ddns-token \
  #     -n cloudflare-ddns --from-literal=CLOUDFLARE_API_TOKEN='your-token'
  # The secret must contain the key CLOUDFLARE_API_TOKEN.
  existingSecret: "cloudflare-ddns-token"
  # Inline token (NOT recommended – committed to git). Leave empty to use
  # existingSecret above.
  apiToken: ""

# Domains whose A (and AAAA, if enabled) records track the public IP.
# favonia creates the records if they don't exist yet.
domains:
  - agu.com.ar
  - home.agu.com.ar
  - argocd.home.agu.com.ar
  - traefik.home.agu.com.ar

# DNS-only (grey cloud). Keep false so Traefik terminates TLS directly and the
# Let's Encrypt HTTP-01 challenge reaches the cluster. Set true to proxy through
# Cloudflare (orange cloud).
proxied: false

# IP detection. IPv4 via Cloudflare's trace endpoint; IPv6 disabled by default.
ip4Provider: "cloudflare.trace"
ip6Provider: "none"

# How often to check/update (favonia internal cron syntax).
updateCron: "@every 5m"

# Optional timezone for log timestamps / cron.
timezone: "America/Argentina/Buenos_Aires"

resources:
  requests:
    cpu: 10m
    memory: 16Mi
  limits:
    cpu: 50m
    memory: 32Mi

nodeSelector: {}
tolerations: []
affinity: {}
