apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agu-spa.fullname" . }}
  labels:
    {{- include "agu-spa.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agu-spa.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agu-spa.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll the pods whenever the nginx config (or placeholder) changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            {{- if eq .Values.content.source "configMap" }}
            # Serve the placeholder index.html from the ConfigMap.
            - name: nginx-conf
              mountPath: {{ .Values.content.root }}/index.html
              subPath: index.html
              readOnly: true
            {{- end }}
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "agu-spa.fullname" . }}-conf
