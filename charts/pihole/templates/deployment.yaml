apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pihole.fullname" . }}
  labels:
    {{- include "pihole.labels" . | nindent 4 }}
spec:
  replicas: 1
  # Pi-hole binds host ports (53/67) via hostNetwork, and a single PVC holds its
  # state, so never run two pods at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "pihole.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pihole.selectorLabels" . | nindent 8 }}
    spec:
      hostNetwork: {{ .Values.hostNetwork }}
      {{- if .Values.hostNetwork }}
      # Keep cluster DNS working for the pod itself when sharing the host netns.
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: pihole
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: http
              containerPort: {{ .Values.webPort }}
              protocol: TCP
            {{- if .Values.dhcp.enabled }}
            - name: dhcp
              containerPort: 67
              protocol: UDP
            {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: TZ
              value: {{ .Values.timezone | quote }}
            # Web UI on a single plain-HTTP port (no 80/443 binding); Traefik
            # terminates TLS upstream.
            - name: FTLCONF_webserver_port
              value: {{ .Values.webPort | quote }}
            - name: FTLCONF_dns_upstreams
              value: {{ .Values.dns.upstreams | quote }}
            - name: FTLCONF_dns_listeningMode
              value: {{ .Values.dns.listeningMode | quote }}
            - name: FTLCONF_dns_dnssec
              value: {{ .Values.dns.dnssec | quote }}
            {{- if .Values.dns.localRecords }}
            # Split-horizon local DNS records (agu.com.ar -> the Pi's LAN IP).
            - name: FTLCONF_dns_hosts
              value: {{ include "pihole.dnsHosts" . | quote }}
            {{- end }}
            {{- if .Values.admin.existingSecret }}
            - name: FTLCONF_webserver_api_password
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.admin.existingSecret }}
                  key: {{ .Values.admin.existingSecretKey }}
            {{- else if .Values.admin.disablePassword }}
            # UI is gated by google-auth; disable Pi-hole's own login so its API
            # never returns 401 (which the google-auth-signin errors middleware
            # would otherwise hijack, breaking the SPA → "Server unreachable!").
            - name: FTLCONF_webserver_api_password
              value: ""
            {{- end }}
            {{- if .Values.dhcp.enabled }}
            - name: FTLCONF_dhcp_active
              value: "true"
            - name: FTLCONF_dhcp_start
              value: {{ .Values.dhcp.start | quote }}
            - name: FTLCONF_dhcp_end
              value: {{ .Values.dhcp.end | quote }}
            - name: FTLCONF_dhcp_router
              value: {{ .Values.dhcp.router | quote }}
            - name: FTLCONF_dhcp_leaseTime
              value: {{ .Values.dhcp.leaseTime | quote }}
            - name: FTLCONF_dhcp_rapidCommit
              value: {{ .Values.dhcp.rapidCommit | quote }}
            - name: FTLCONF_dhcp_ipv6
              value: {{ .Values.dhcp.ipv6 | quote }}
            {{- if .Values.dhcp.reservations }}
            # Static MAC→IP reservations (Broadlink, ESPHome BT proxies, ...).
            - name: FTLCONF_dhcp_hosts
              value: {{ include "pihole.dhcpHosts" . | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          # Probe the web UI. Startup probe tolerates first-boot gravity build;
          # liveness/readiness stay lean once FTL is up.
          startupProbe:
            httpGet:
              path: /admin
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /admin
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /admin
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/pihole
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: config
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-config" (include "pihole.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
