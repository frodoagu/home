{{- if and .Values.ingress.enabled .Values.googleAuth.enabled }}
# Local copy of the google-auth ForwardAuth middleware, living in THIS namespace.
#
# The canonical pair lives in kube-system (charts/traefik-config). Traefik does
# not allow IngressRoutes to reference middlewares across namespaces by default,
# so the Pi-hole IngressRoute here needs the middleware in its own namespace.
# Both copies just delegate to the cluster-wide oauth2-proxy, so duplicating them
# is cheap and keeps this chart self-contained.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: google-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pihole.labels" . | nindent 4 }}
spec:
  forwardAuth:
    address: {{ .Values.googleAuth.forwardAuthAddress }}
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
    trustForwardHeader: true
---
# Turns oauth2-proxy 401 (no session) responses into a browser redirect to
# sign-in. Scoped to 401 ONLY (not 401-403): Pi-hole returns 403 for the web
# root "/", and catching 403 here would hijack that backend response into an
# endless sign-in loop. oauth2-proxy uses 401 for "no session", so 401 alone
# still triggers the redirect for genuinely unauthenticated users.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: google-auth-signin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pihole.labels" . | nindent 4 }}
spec:
  errors:
    status:
      - "401"
    service:
      name: {{ .Values.googleAuth.oauth2ProxyService.name }}
      namespace: {{ .Values.googleAuth.oauth2ProxyService.namespace }}
      port: {{ .Values.googleAuth.oauth2ProxyService.port }}
    query: {{ .Values.googleAuth.signInQuery | quote }}
{{- end }}
