apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shelly-proxy.fullname" . }}
  labels:
    {{- include "shelly-proxy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "shelly-proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shelly-proxy.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll the pod whenever the nginx config / panel / device list changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: conf
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
              readOnly: true
            - name: conf
              mountPath: /usr/share/nginx/html/app.js
              subPath: app.js
              readOnly: true
            - name: conf
              mountPath: /usr/share/nginx/html/devices.json
              subPath: devices.json
              readOnly: true
      volumes:
        - name: conf
          configMap:
            name: {{ include "shelly-proxy.fullname" . }}
