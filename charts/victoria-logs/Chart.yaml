apiVersion: v2
name: victoria-logs
description: >-
  Lightweight log database for the RPi k3s cluster — VictoriaLogs (single node)
  plus the bundled Vector agent that ships every pod's logs into it. Pairs with
  the metrics stack in charts/monitoring (same VictoriaMetrics ecosystem) and is
  queryable from the same Grafana via the VictoriaLogs datasource. Tuned for low
  RAM and few disk writes (SD-card friendly): short retention + a hard disk cap.
  The VictoriaLogs UI (vmui) is gated by the same google-auth ForwardAuth as the
  other private services.
type: application
version: 0.1.0
appVersion: "v1.51.0"
keywords:
  - logs
  - victorialogs
  - victoriametrics
  - vector
  - raspberrypi
  - gitops
sources:
  - https://github.com/VictoriaMetrics/helm-charts/tree/master/charts/victoria-logs-single
  - https://docs.victoriametrics.com/victorialogs/
maintainers:
  - name: frodoagu
dependencies:
  - name: victoria-logs-single
    version: "0.13.8"
    repository: https://victoriametrics.github.io/helm-charts/
