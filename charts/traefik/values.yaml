# Default values for traefik wrapper chart.
# All keys under traefik are forwarded to the upstream traefik chart.
# Full reference: https://github.com/traefik/traefik-helm-chart/blob/master/traefik/values.yaml

traefik:
  # ── Entry points ──────────────────────────────────────────────────────────
  ports:
    web:
      port: 8000
      expose:
        default: true
      exposedPort: 80
      protocol: TCP
      # Redirect all HTTP traffic to HTTPS
      redirectTo:
        port: websecure
    websecure:
      port: 8443
      expose:
        default: true
      exposedPort: 443
      protocol: TCP
      tls:
        enabled: true
        certResolver: letsencrypt

  # ── Let's Encrypt (ACME) certificate resolver ──────────────────────────────
  # Uses the HTTP-01 challenge: Traefik must be reachable on port 80 from the
  # internet for domain validation.  For a home lab behind NAT you may need to
  # forward port 80 & 443 on your router, or switch to dnsChallenge instead.
  certResolvers:
    letsencrypt:
      # REQUIRED – replace with your real email address
      email: federico.nicolas.agu@gmail.com
      # Store ACME certificates in a persistent volume
      storage: /data/acme.json
      httpChallenge:
        entryPoint: web
      # Uncomment and remove httpChallenge to use DNS-01 instead:
      # dnsChallenge:
      #   provider: cloudflare
      #   delayBeforeCheck: 0

  # ── Persistence for acme.json ──────────────────────────────────────────────
  persistence:
    enabled: true
    name: data
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 128Mi
    path: /data

  # ── Service type – LoadBalancer exposes ports 80/443 on the RPi's IP ──────
  service:
    type: LoadBalancer

  # ── RBAC & security ────────────────────────────────────────────────────────
  rbac:
    enabled: true

  # ── Resource limits – tune for RPi ─────────────────────────────────────────
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 300m
      memory: 128Mi

  # ── Dashboard – exposed at https://traefik.home.agu.com.ar ─────────────────
  # Protected by HTTP basic auth (see dashboardAuth below).
  ingressRoute:
    dashboard:
      enabled: true
      matchRule: Host(`traefik.home.agu.com.ar`)
      entryPoints:
        - websecure
      middlewares:
        - name: dashboard-auth
      tls:
        certResolver: letsencrypt

  # ── Deployment ─────────────────────────────────────────────────────────────
  deployment:
    replicas: 1

  # ── Log level ──────────────────────────────────────────────────────────────
  logs:
    general:
      level: INFO
    access:
      enabled: true

# ── Dashboard authentication (HTTP basic auth middleware) ────────────────────
# Creates a Traefik `basicAuth` Middleware named `dashboard-auth` that the
# dashboard IngressRoute references above.
dashboardAuth:
  enabled: true
  # Option A (default, recommended) – reference a Secret you create out-of-band
  # so the password never lives in git. Create it once with:
  #   htpasswd -nb admin 'your-password' | \
  #     kubectl create secret generic traefik-dashboard-auth \
  #       -n traefik --from-file=users=/dev/stdin
  existingSecret: "traefik-dashboard-auth"
  # Option B (convenience) – inline htpasswd entries managed by this chart.
  # To use, set existingSecret to "" and add entries below. NOTE: these are
  # committed to git, so only use this with a throwaway password.
  # Generate a hashed entry with: htpasswd -nb admin 'your-password'
  users: []
  # - "admin:$apr1$xxxxxxxx$yyyyyyyyyyyyyyyyyyyyyy"
