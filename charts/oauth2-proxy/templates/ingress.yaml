{{- if .Values.ingress.enabled }}
# Traefik IngressRoute for the oauth2-proxy auth endpoints.
# Handles:
#   /oauth2/callback  – Google redirects here after the user signs in
#   /oauth2/sign_in   – Sign-in page (shown when unauthenticated)
#   /oauth2/sign_out  – Sign-out
#   /oauth2/auth      – ForwardAuth endpoint (used internally by Traefik)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "oauth2-proxy-wrapper.serviceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: oauth2-proxy
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      {{- if .Values.ingress.middlewares }}
      middlewares:
        {{- range .Values.ingress.middlewares }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      services:
        - name: {{ include "oauth2-proxy-wrapper.serviceName" . }}
          port: 80
  tls:
    certResolver: {{ .Values.ingress.certResolver }}
{{- end }}
