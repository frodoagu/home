apiVersion: v2
name: origin-firewall
description: >-
  Cloudflare-only origin firewall for the home-lab. A privileged, host-networked
  DaemonSet programs an nftables table on the node that drops direct-to-public-IP
  hits on 80/443 (accepts only Cloudflare + LAN/cluster), below klipper's SNAT
  where the real source IP is still visible. See docs/origin-firewall.md.
type: application
version: 0.1.0
# The runtime image is our own (images/origin-firewall → GHCR), digest-pinned by
# Image Updater into values.image.tag, so appVersion isn't used for the image ref.
appVersion: "1.0.0"
keywords:
  - firewall
  - nftables
  - cloudflare
  - security
sources:
  - https://github.com/frodoagu/home
maintainers:
  - name: frodoagu
