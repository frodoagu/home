{{- /* Build a []string of ports so join renders "80, 443" from int values. */ -}}
{{- $ports := list }}
{{- range .Values.webPorts }}{{ $ports = append $ports (printf "%v" .) }}{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "origin-firewall.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "origin-firewall.labels" . | nindent 4 }}
data:
  origin-firewall.nft: |
    # Rendered from charts/origin-firewall/values.yaml — do not edit in-cluster.
    # Cloudflare-only origin firewall. Runs at prerouting priority -300, BEFORE
    # klipper's dstnat (-100) and any POSTROUTING masquerade, so it sees the real
    # source IP. Only tcp/{{ $ports | join "," }} are policed; SSH/6443/etc. untouched.
    #
    # Idempotent (re)load: create-then-delete so `nft -f` can run repeatedly.
    add table inet origin_fw
    delete table inet origin_fw

    table inet origin_fw {
        set cloudflare_v4 {
            type ipv4_addr
            flags interval
            elements = { {{ .Values.cloudflareIPv4 | join ", " }} }
        }
        set cloudflare_v6 {
            type ipv6_addr
            flags interval
            elements = { {{ .Values.cloudflareIPv6 | join ", " }} }
        }
        set local_v4 {
            type ipv4_addr
            flags interval
            elements = { {{ .Values.localIPv4 | join ", " }} }
        }
        {{- if .Values.localIPv6 }}
        set local_v6 {
            type ipv6_addr
            flags interval
            elements = { {{ .Values.localIPv6 | join ", " }} }
        }
        {{- end }}

        chain prerouting {
            type filter hook prerouting priority -300; policy accept;
            # Only inbound web ports enter the filter; everything else is accepted.
            tcp dport { {{ $ports | join ", " }} } jump web_filter
        }

        chain web_filter {
            ip  saddr @cloudflare_v4 counter accept
            ip6 saddr @cloudflare_v6 counter accept
            ip  saddr @local_v4      counter accept
            {{- if .Values.localIPv6 }}
            ip6 saddr @local_v6      counter accept
            {{- else }}
            ip6 saddr ::1            counter accept
            {{- end }}
            # Not Cloudflare, not local → a direct-to-origin bypass. Drop it.
            counter drop
        }
    }

  entrypoint.sh: |
    #!/bin/sh
    set -eu
    export DEBIAN_FRONTEND=noninteractive
    RULESET=/etc/origin-firewall/origin-firewall.nft
    INTERVAL="${RECONCILE_INTERVAL:-30}"
    CF_AUTO_UPDATE="${CF_AUTO_UPDATE:-true}"
    CF_UPDATE_INTERVAL="${CF_UPDATE_INTERVAL:-43200}"
    CF_V4_URL="${CF_V4_URL:-https://www.cloudflare.com/ips-v4}"
    CF_V6_URL="${CF_V6_URL:-https://www.cloudflare.com/ips-v6}"

    # Debian base is bare; apt-install nft (+ curl/CA certs for auto-update).
    # Retry until egress is up. The firewall only filters INBOUND 80/443, so
    # egress (apt, the CF fetch) is never blocked by it. NB: Debian, not Alpine —
    # Alpine's musl nft segfaults on aarch64 (see values.yaml image comment).
    until command -v nft >/dev/null 2>&1 && command -v curl >/dev/null 2>&1 \
        || { apt-get update -qq && apt-get install -y -qq --no-install-recommends \
             nftables curl ca-certificates; }; do
      echo "origin-firewall: waiting to install tools..."; sleep 5
    done

    # Load the full table (chains + the baked-in fallback CF/local sets).
    apply_base() { nft -f "$RULESET" && echo "origin-firewall: base ruleset applied"; }

    # Fetch one CF list, validate it, and ATOMICALLY replace its set. Any failure
    # (network, garbage response, too few entries) returns non-zero and changes
    # NOTHING, so the last-known-good set — or the baked fallback — is preserved.
    refresh_cf_set() {
      name="$1"; url="$2"; family="$3"   # family: ip | ip6
      data="$(curl -fsS --max-time 20 "$url" 2>/dev/null)" || return 1
      if [ "$family" = "ip" ]; then
        ranges="$(printf '%s\n' "$data" | grep -E '^[0-9]{1,3}(\.[0-9]{1,3}){3}/[0-9]{1,2}$' || true)"
      else
        ranges="$(printf '%s\n' "$data" | grep -E '^[0-9a-fA-F:]+/[0-9]{1,3}$' || true)"
      fi
      count="$(printf '%s\n' "$ranges" | grep -c . || true)"
      [ "$count" -ge 3 ] || return 1   # sanity floor: never accept an empty/short list
      elements="$(printf '%s\n' "$ranges" | tr '\n' ',' | sed 's/,*$//')"
      printf 'flush set inet origin_fw %s\nadd element inet origin_fw %s { %s }\n' \
        "$name" "$name" "$elements" | nft -f - || return 1
      echo "origin-firewall: $name refreshed from Cloudflare ($count ranges)"
    }

    refresh_cf() {
      [ "$CF_AUTO_UPDATE" = "true" ] || return 0
      refresh_cf_set cloudflare_v4 "$CF_V4_URL" ip  || echo "origin-firewall: v4 refresh skipped (keeping current)"
      refresh_cf_set cloudflare_v6 "$CF_V6_URL" ip6 || echo "origin-firewall: v6 refresh skipped (keeping current)"
    }

    apply_base          # ConfigMap changes take effect when pods roll
    refresh_cf
    last_cf="$(date +%s)"

    while true; do
      sleep "$INTERVAL"
      # Self-heal: if our table vanished, reload it (reverts CF sets to the
      # fallback), then force a fresh CF fetch on the next tick.
      if ! nft list table inet origin_fw >/dev/null 2>&1; then
        echo "origin-firewall: table missing, re-applying"; apply_base; last_cf=0
      fi
      if [ "$CF_AUTO_UPDATE" = "true" ]; then
        now="$(date +%s)"
        if [ "$(( now - last_cf ))" -ge "$CF_UPDATE_INTERVAL" ]; then
          refresh_cf; last_cf="$now"
        fi
      fi
    done
