{{- /* Build a []string of ports so join renders "80, 443" from int values. */ -}}
{{- $ports := list }}
{{- range .Values.webPorts }}{{ $ports = append $ports (printf "%v" .) }}{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "origin-firewall.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "origin-firewall.labels" . | nindent 4 }}
data:
  origin-firewall.nft: |
    # Rendered from charts/origin-firewall/values.yaml — do not edit in-cluster.
    # Cloudflare-only origin firewall. Runs at prerouting priority -300, BEFORE
    # klipper's dstnat (-100) and any POSTROUTING masquerade, so it sees the real
    # source IP. Only tcp/{{ $ports | join "," }} are policed; SSH/6443/etc. untouched.
    #
    # Idempotent (re)load: create-then-delete so `nft -f` can run repeatedly.
    add table inet origin_fw
    delete table inet origin_fw

    table inet origin_fw {
        set cloudflare_v4 {
            type ipv4_addr
            flags interval
            elements = { {{ .Values.cloudflareIPv4 | join ", " }} }
        }
        set cloudflare_v6 {
            type ipv6_addr
            flags interval
            elements = { {{ .Values.cloudflareIPv6 | join ", " }} }
        }
        set local_v4 {
            type ipv4_addr
            flags interval
            elements = { {{ .Values.localIPv4 | join ", " }} }
        }
        {{- if .Values.localIPv6 }}
        set local_v6 {
            type ipv6_addr
            flags interval
            elements = { {{ .Values.localIPv6 | join ", " }} }
        }
        {{- end }}

        chain prerouting {
            type filter hook prerouting priority -300; policy accept;
            # Only inbound web ports enter the filter; everything else is accepted.
            tcp dport { {{ $ports | join ", " }} } jump web_filter
        }

        chain web_filter {
            ip  saddr @cloudflare_v4 counter accept
            ip6 saddr @cloudflare_v6 counter accept
            ip  saddr @local_v4      counter accept
            {{- if .Values.localIPv6 }}
            ip6 saddr @local_v6      counter accept
            {{- else }}
            ip6 saddr ::1            counter accept
            {{- end }}
            # Not Cloudflare, not local → a direct-to-origin bypass. Drop it.
            counter drop
        }
    }

  entrypoint.sh: |
    #!/bin/sh
    set -eu
    RULESET=/etc/origin-firewall/origin-firewall.nft
    INTERVAL="${RECONCILE_INTERVAL:-30}"

    # nftables isn't in the base image; install it (retry until egress is up).
    until command -v nft >/dev/null 2>&1 || apk add --no-cache nftables; do
      echo "origin-firewall: waiting to install nftables..."; sleep 5
    done

    apply() { nft -f "$RULESET" && echo "origin-firewall: ruleset applied"; }

    # Apply once at startup so ConfigMap changes take effect when pods roll.
    apply

    # Self-heal: re-apply only if our table vanished (keeps counters otherwise).
    while true; do
      sleep "$INTERVAL"
      nft list table inet origin_fw >/dev/null 2>&1 \
        || { echo "origin-firewall: table missing, re-applying"; apply; }
    done
