# Cloudflare-only origin firewall (host nftables via DaemonSet).
#
# Blocks direct-to-public-IP hits on the web ports so the origin is only
# reachable through Cloudflare (all services are CF-proxied) or the local LAN.
# See docs/origin-firewall.md for how it works and the router-SNAT caveat.

image:
  # Debian (glibc), NOT Alpine: Alpine's musl-based nft segfaults on aarch64/ARM
  # when loading a ruleset (verified on this Pi — SIGSEGV/exit 139). Debian's nft
  # applies the same ruleset cleanly. nftables/curl are apt-installed on start;
  # egress is never blocked by this firewall (it only filters inbound 80/443).
  repository: debian
  tag: "trixie-slim"
  pullPolicy: IfNotPresent

# Seconds between self-heal checks (re-applies the table only if it vanished, so
# per-rule counters keep accumulating between pod restarts).
reconcileInterval: 30

# TCP ports to police. ONLY these are filtered; everything else on the host
# (SSH 22, k8s API 6443, ...) is never matched, so a bad ruleset cannot lock you
# out of SSH.
webPorts:
  - 80
  - 443

# Keep the nftables Cloudflare sets fresh by periodically fetching the published
# ranges. The lists below are still applied as the baked-in FALLBACK (used at
# boot and whenever a fetch fails/looks invalid), so the firewall always has a
# known-good allowlist even with no egress. Fetches replace only the cloudflare_v4
# /v6 sets, atomically, and only after validation — a bad response changes nothing.
cloudflareAutoUpdate:
  enabled: true
  # How often to re-fetch (seconds). CF ranges change very rarely; 12h is plenty.
  interval: 43200
  ipv4Url: https://www.cloudflare.com/ips-v4
  ipv6Url: https://www.cloudflare.com/ips-v6

# Cloudflare edge ranges — the only public sources allowed to reach the origin.
# Baked-in fallback / initial value; kept fresh at runtime when cloudflareAutoUpdate
# is enabled. Sync manually from https://www.cloudflare.com/ips/ if auto-update is off.
cloudflareIPv4:
  - 173.245.48.0/20
  - 103.21.244.0/22
  - 103.22.200.0/22
  - 103.31.4.0/22
  - 141.101.64.0/18
  - 108.162.192.0/18
  - 190.93.240.0/20
  - 188.114.96.0/20
  - 197.234.240.0/22
  - 198.41.128.0/17
  - 162.158.0.0/15
  - 104.16.0.0/13
  - 104.24.0.0/14
  - 172.64.0.0/13
  - 131.0.72.0/22
cloudflareIPv6:
  - 2400:cb00::/32
  - 2606:4700::/32
  - 2803:f800::/32
  - 2405:b500::/32
  - 2405:8100::/32
  - 2a06:98c0::/29
  - 2c0f:f248::/32

# Local sources that must always reach the ingress directly (not via Cloudflare):
#   192.168.0.0/24  home LAN (the Pi is 192.168.0.100)
#   10.0.0.0/8      k3s pod (10.42.0.0/16) + service (10.43.0.0/16) CIDRs
#   127.0.0.0/8     loopback
localIPv4:
  - 192.168.0.0/24
  - 10.0.0.0/8
  - 127.0.0.0/8
localIPv6:
  - ::1/128

# Container privileges. NET_ADMIN (+ NET_RAW) on a hostNetwork pod is enough to
# program the host's nftables. If the DaemonSet logs show nft permission errors
# on your kernel, set privileged: true.
privileged: false

# Small footprint for the RPi.
resources:
  requests:
    cpu: 10m
    memory: 16Mi
  limits:
    cpu: 100m
    # Headroom for the apt install on startup (apt/dpkg spikes above steady state).
    memory: 128Mi
