{{- if .Values.ingress.enabled }}
# Traefik IngressRoute for Grafana, gated by the google-auth ForwardAuth
# middleware (Google sign-in, allowlist enforced by oauth2-proxy). The grafana
# subchart's own service is named "<release>-grafana" and listens on port 80.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "monitoring.fullname" . }}-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "monitoring.labels" . | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      {{- if .Values.googleAuth.enabled }}
      middlewares:
        - name: google-auth-signin
        - name: google-auth
      {{- end }}
      services:
        - name: {{ .Release.Name }}-grafana
          port: 80
  tls:
    certResolver: {{ .Values.ingress.certResolver }}
# HTTP → HTTPS redirect is handled globally by the bundled Traefik (see
# charts/traefik-config), so no separate HTTP route is needed.
{{- end }}
