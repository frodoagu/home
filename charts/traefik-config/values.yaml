# Configuration for the k3s-bundled Traefik.
# This chart does NOT install Traefik – k3s already runs it via the
# helm-controller. It deploys a `HelmChartConfig` that overrides the bundled
# chart's values, plus the dashboard basic-auth middleware/secret.

# Namespace where the bundled Traefik runs (k3s default: kube-system).
# The ArgoCD Application must target this same namespace.
traefikNamespace: kube-system

# ── Traefik image ────────────────────────────────────────────────────────────
# This chart can't change the k3s-bundled Traefik *chart* version (that's pinned
# by k3s' own HelmChart resource), but it can pin the container *image* via the
# HelmChartConfig. This runs Traefik v3.7.5 on top of the bundled chart.
# Bump deliberately and confirm the bundled chart still accepts these values.
image:
  repository: docker.io/traefik
  tag: "v3.7.5"

# ── Let's Encrypt (ACME, DNS-01 challenge via Cloudflare) ────────────────────
# DNS-01 is used instead of HTTP-01 because the global HTTP→HTTPS redirect
# (ports.web) bounces the HTTP-01 challenge to :443, which serves a 404 for the
# challenge path. DNS-01 needs no inbound ports and works for Cloudflare-proxied
# records too.
acme:
  email: federico.nicolas.agu@gmail.com
  storage: /data/acme.json
  dnsChallenge:
    provider: cloudflare
    # Secret in the Traefik namespace holding a Cloudflare API token
    # (Zone:DNS:Edit on agu.com.ar) under the key below. Created out-of-band so
    # the token never lives in git:
    #   kubectl create secret generic traefik-cloudflare-token -n kube-system \
    #     --from-literal=CF_DNS_API_TOKEN='your-token'
    existingSecret: traefik-cloudflare-token
    tokenKey: CF_DNS_API_TOKEN

# ── Persistence for acme.json (survives Traefik restarts) ────────────────────
persistence:
  enabled: true
  size: 128Mi
  path: /data

# ── Dashboard ────────────────────────────────────────────────────────────────
dashboard:
  enabled: true
  host: traefik.agu.com.ar

# ── Dashboard authentication (HTTP basic auth middleware) ────────────────────
dashboardAuth:
  enabled: true
  # Option A (default, recommended) – reference a Secret you create out-of-band
  # so the password never lives in git. Create it once with:
  #   htpasswd -nb admin 'your-password' | \
  #     kubectl create secret generic traefik-dashboard-auth \
  #       -n kube-system --from-file=users=/dev/stdin
  existingSecret: "traefik-dashboard-auth"
  # Option B (convenience) – inline htpasswd entries managed by this chart.
  # To use, set existingSecret to "" and add entries below. NOTE: these are
  # committed to git, so only use this with a throwaway password.
  # Generate a hashed entry with: htpasswd -nb admin 'your-password'
  users: []
  # - "admin:$apr1$xxxxxxxx$yyyyyyyyyyyyyyyyyyyyyy"
