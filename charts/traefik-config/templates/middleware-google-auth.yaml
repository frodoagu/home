{{- if .Values.googleAuth.enabled }}
# ForwardAuth middleware that delegates authentication to oauth2-proxy.
# Any IngressRoute can reference `google-auth` to require Google sign-in.
#
# Flow:
#   1. Browser hits a protected route (e.g. traefik.agu.com.ar).
#   2. Traefik sends a subrequest to oauth2-proxy /oauth2/auth.
#   3a. Valid session cookie → 202 Accepted; Traefik allows the request through
#       and passes X-Auth-Request-User / X-Auth-Request-Email headers downstream.
#   3b. No/expired session → 401 Unauthorized; navigate to auth.agu.com.ar to
#       sign in with Google, then retry. The cookie covers all .agu.com.ar subdomains.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: google-auth
  namespace: {{ .Values.traefikNamespace }}
spec:
  forwardAuth:
    address: {{ .Values.googleAuth.forwardAuthAddress }}
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
    trustForwardHeader: true
{{- end }}
