{{- if .Values.googleAuth.enabled }}
# ForwardAuth middleware that delegates authentication to oauth2-proxy.
# Any IngressRoute can reference `google-auth` to require Google sign-in.
#
# Flow:
#   1. Browser hits a protected route (e.g. traefik.agu.com.ar).
#   2. Traefik sends a subrequest to oauth2-proxy /oauth2/auth.
#   3a. Valid session cookie → 202 Accepted; Traefik allows the request through
#       and passes X-Auth-Request-User / X-Auth-Request-Email headers downstream.
#   3b. No/expired session → 401 Unauthorized (caught by google-auth-signin
#       middleware below), which redirects the browser to /oauth2/sign_in.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: google-auth
  namespace: {{ .Values.traefikNamespace }}
spec:
  forwardAuth:
    address: {{ .Values.googleAuth.forwardAuthAddress }}
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
    trustForwardHeader: true
---
# Converts oauth2-proxy 401/403 responses into browser redirects to sign-in.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: google-auth-signin
  namespace: {{ .Values.traefikNamespace }}
spec:
  errors:
    status:
      - "401-403"
    service:
      name: {{ .Values.googleAuth.oauth2ProxyService.name }}
      namespace: {{ .Values.googleAuth.oauth2ProxyService.namespace }}
      port: {{ .Values.googleAuth.oauth2ProxyService.port }}
    query: {{ .Values.googleAuth.signInQuery | quote }}
{{- end }}
