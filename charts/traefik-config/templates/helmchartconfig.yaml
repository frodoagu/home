# Overrides the values of the k3s-bundled Traefik HelmChart.
# The k3s helm-controller merges this into the upstream traefik chart and
# redeploys Traefik whenever it changes.
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: {{ .Values.traefikNamespace }}
spec:
  valuesContent: |-
    # Pin the Traefik container image (overrides the bundled chart's default),
    # so we run a specific Traefik version regardless of the k3s-bundled chart.
    image:
      repository: {{ .Values.image.repository }}
      tag: {{ .Values.image.tag | quote }}
    # Redirect ALL HTTP (:80/web) traffic to HTTPS (:443/websecure) at the
    # entrypoint level, so every route is HTTPS-only regardless of its Ingress.
    # NOTE: these are the correct keys for the Traefik chart shipped with this
    # k3s (chart 39.x / Traefik v3.6): the redirect lives under
    # `ports.web.http.redirections.entryPoint` (the older `ports.web.redirectTo`
    # key is silently ignored), and ACME resolvers use `certificatesResolvers`
    # (not `certResolvers`). ACME HTTP-01 challenges are still served on :80 —
    # Traefik answers the challenge before applying this redirect.
    ports:
      web:
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
      websecure:
        tls:
          certResolver: letsencrypt
    certificatesResolvers:
      letsencrypt:
        acme:
          email: {{ .Values.acme.email }}
          storage: {{ .Values.acme.storage }}
          dnsChallenge:
            provider: {{ .Values.acme.dnsChallenge.provider }}
    # Access logs (request/response details) to stdout for debugging. This is
    # the Traefik *chart* key (logs.access); the bare top-level `accessLog`
    # static-config key is not a chart value and is silently ignored. With no
    # filePath set, Traefik writes access logs to stdout (kubectl logs).
    logs:
      access:
        enabled: true
        format: json
    # Cloudflare API token for the lego DNS-01 provider. Sourced from a Secret
    # in the Traefik namespace (see values.yaml) so it never lives in git.
    env:
      - name: {{ .Values.acme.dnsChallenge.tokenKey }}
        valueFrom:
          secretKeyRef:
            name: {{ .Values.acme.dnsChallenge.existingSecret }}
            key: {{ .Values.acme.dnsChallenge.tokenKey }}
    {{- if .Values.persistence.enabled }}
    persistence:
      enabled: true
      name: data
      accessMode: ReadWriteOnce
      size: {{ .Values.persistence.size }}
      path: {{ .Values.persistence.path }}
    # acme.json must be mode 0600; create it with the right perms on startup.
    deployment:
      initContainers:
        - name: volume-permissions
          image: busybox:1.36
          command: ["sh", "-c", "touch {{ .Values.acme.storage }} && chmod -v 600 {{ .Values.acme.storage }}"]
          securityContext:
            runAsNonRoot: true
            runAsGroup: 65532
            runAsUser: 65532
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.path }}
    {{- end }}
    {{- if .Values.dashboard.enabled }}
    ingressRoute:
      dashboard:
        enabled: true
        matchRule: Host(`{{ .Values.dashboard.host }}`)
        entryPoints:
          - websecure
        {{- if .Values.googleAuth.enabled }}
        middlewares:
          - name: google-auth
        {{- else if .Values.dashboardAuth.enabled }}
        middlewares:
          - name: dashboard-auth
        {{- end }}
        tls:
          certResolver: letsencrypt
    {{- end }}
