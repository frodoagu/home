# Default values for argocd wrapper chart.
# All keys under argo-cd are forwarded to the upstream argo-cd chart.
# Full reference: https://github.com/argoproj/argo-helm/blob/main/charts/argo-cd/values.yaml

argo-cd:
  # -- Expose Argo CD server via Traefik ingress
  server:
    ingress:
      enabled: true
      ingressClassName: traefik
      hostname: argocd.agu.com.ar
      # Do NOT set `tls: true` here: that makes the upstream chart add a
      # `tls.secretName: argocd-server-tls` block, and Traefik then looks for a
      # (non-existent) Kubernetes secret to terminate TLS with instead of using
      # the ACME certResolver below. TLS is enabled via the annotations instead,
      # so Traefik obtains the certificate through Let's Encrypt.
      tls: false
      annotations:
        traefik.ingress.kubernetes.io/router.tls: "true"
        traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
        traefik.ingress.kubernetes.io/router.entrypoints: websecure

  # -- Terminate TLS at the Traefik ingress and run argocd-server in plain-HTTP
  # mode. This MUST be set via configs.params (not server.extraArgs): the chart's
  # ingress template reads `server.insecure` from here to decide whether the
  # Ingress backend targets the service's http (80) or https (443) port. With
  # extraArgs alone the server runs insecure but the Ingress still points at 443,
  # so Traefik speaks plain HTTP to a TLS-expecting port and routing breaks.
  configs:
    params:
      server.insecure: true

    # -- Google sign-in via the bundled Dex (OIDC). ArgoCD's own login page gains
    # a "Log in via Google" button; the argocd CLI keeps working (`argocd login
    # argocd.agu.com.ar --sso`) and the GitHub /api/webhook stays unauthenticated.
    # `url` is required so Dex builds the correct callback. The clientID/secret
    # are pulled from the out-of-band `argocd-google-oidc` secret (labelled
    # app.kubernetes.io/part-of: argocd so ArgoCD resolves the $-references); see
    # docs/secrets.md. Add https://argocd.agu.com.ar/api/dex/callback to the
    # Google OAuth client's Authorized redirect URIs.
    cm:
      url: https://argocd.agu.com.ar
      dex.config: |
        connectors:
          - type: oidc
            id: google
            name: Google
            config:
              issuer: https://accounts.google.com
              clientID: $argocd-google-oidc:clientId
              clientSecret: $argocd-google-oidc:clientSecret
              redirectURI: https://argocd.agu.com.ar/api/dex/callback

    # -- Map the signed-in Google account (matched by email) to ArgoCD admin.
    # `scopes: [email]` makes RBAC match the email claim; everyone else gets the
    # empty default role (no access). Add more `g, <email>, role:admin` lines to
    # grant additional users.
    rbac:
      policy.default: ""
      scopes: "[email]"
      policy.csv: |
        g, federico.nicolas.agu@gmail.com, role:admin

  # -- Use a single replica for a home / RPi environment
  controller:
    replicas: 1

  repoServer:
    replicas: 1

  applicationSet:
    replicas: 1

  # -- Pin to the argo-cd chart's bundled appVersion (v3.4.4) by not overriding
  # the image tag. Bump the chart version in Chart.yaml to move to a newer ArgoCD.
