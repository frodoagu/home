# Default values for nginx-spa.
# Adjust these to match your environment.

replicaCount: 1
image:
  # The agu.com.ar SPA, built from site/ and baked into an nginx image by the
  # build-site GitHub Action (.github/workflows/site.yml). CI pushes the mutable
  # `latest` tag; Argo CD Image Updater watches its digest and rewrites `tag`
  # below to `latest@sha256:...` via git (see the ImageUpdater CR in
  # charts/argocd-image-updater), so what actually runs is always an immutable digest.
  repository: ghcr.io/frodoagu/home-site
  pullPolicy: IfNotPresent
  # Managed by Argo CD Image Updater. Starts as the mutable tag; gets pinned to
  # `latest@sha256:<digest>` on the first reconcile.
  tag: "latest@sha256:eb1564ccf7552d5619efcbadaa391fc4e88e097a0ef79d2e70a8ae03e4c7acd5"
# Pull secret(s) for the private GHCR image. Create out-of-band (never commit):
#   kubectl -n nginx-spa create secret docker-registry ghcr-creds \
#     --docker-server=ghcr.io \
#     --docker-username=<github-user> \
#     --docker-password=<github-PAT-with-read:packages>
imagePullSecrets:
- name: ghcr-creds
nameOverride: ""
fullnameOverride: ""
# nginx serves the SPA on port 80
service:
  type: ClusterIP
  port: 80
# Where the static files come from. Pick one:
#   image    – the SPA is already baked into image.repository at contentRoot.
#   configMap – render a tiny placeholder index.html from this chart (handy to
#               validate the deploy before wiring up a real build/image).
content:
  source: image
  # Filesystem path inside the container that nginx serves as the web root.
  root: /usr/share/nginx/html
  # Placeholder page used only when source == configMap.
  placeholderHtml: "<!doctype html>\n<html lang=\"en\">\n  <head><meta charset=\"utf-8\"><title>nginx-spa</title></head>\n  <body style=\"font-family: system-ui; text-align: center; margin-top: 4rem\">\n    <h1>nginx-spa is running \U0001F389</h1>\n    <p>Replace this by setting <code>content.source: image</code> and a real SPA image.</p>\n  </body>\n</html>\n"
# Ingress via Traefik IngressRoute
ingress:
  enabled: true
  # Hostname for the SPA
  host: agu.com.ar
  # TLS certificate resolver name configured in the Traefik chart (see charts/traefik-config)
  certResolver: letsencrypt
  # Additional Traefik middlewares to attach (e.g. auth, rate-limit)
  middlewares: []
# Resource requests/limits – tune for RPi. nginx serving static files is cheap.
resources:
  requests:
    cpu: 10m
    memory: 16Mi
  limits:
    cpu: 100m
    memory: 64Mi
nodeSelector: {}
tolerations: []
affinity: {}
# Extra environment variables for the nginx container
env: []
