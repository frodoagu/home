apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "home-assistant.fullname" . }}
  labels:
    {{- include "home-assistant.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "home-assistant.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "home-assistant.selectorLabels" . | nindent 8 }}
    spec:
      hostNetwork: {{ .Values.hostNetwork }}
      {{- if .Values.hostNetwork }}
      # Keep cluster DNS working when sharing the host network namespace
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.ingress.enabled }}
      initContainers:
        - name: copy-base-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # Ensure trusted_proxies config exists (needed for reverse proxy)
              # On first run: copy the whole ConfigMap
              # On restarts: skip if http section already exists
              if [ ! -f /config/configuration.yaml ]; then
                cp /base-config/configuration.yaml /config/
              elif ! grep -q "trusted_proxies:" /config/configuration.yaml; then
                # Append http config if not already present
                echo "" >> /config/configuration.yaml
                echo "http:" >> /config/configuration.yaml
                echo "  use_x_forwarded_for: true" >> /config/configuration.yaml
                echo "  trusted_proxies:" >> /config/configuration.yaml
                echo "    - 10.0.0.0/8" >> /config/configuration.yaml
                echo "    - 172.16.0.0/12" >> /config/configuration.yaml
                echo "    - 192.168.0.0/16" >> /config/configuration.yaml
              fi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: base-config
              mountPath: /base-config
              readOnly: true
      {{- end }}
      containers:
        - name: home-assistant
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8123
              protocol: TCP
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: config
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-config" (include "home-assistant.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.ingress.enabled }}
        - name: base-config
          configMap:
            name: {{ include "home-assistant.fullname" . }}-base-config
            items:
              - key: configuration.yaml
                path: configuration.yaml
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
