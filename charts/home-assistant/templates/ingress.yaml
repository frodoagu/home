{{- if .Values.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "home-assistant.fullname" . }}
  labels:
    {{- include "home-assistant.labels" . | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      services:
        - name: {{ include "home-assistant.fullname" . }}
          port: {{ .Values.service.port }}
      {{- if .Values.ingress.middlewares }}
      middlewares:
        {{- range .Values.ingress.middlewares }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
  tls:
    certResolver: {{ .Values.ingress.certResolver }}
---
# Redirect HTTP → HTTPS
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "home-assistant.fullname" . }}-http
  labels:
    {{- include "home-assistant.labels" . | nindent 4 }}
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      services:
        - name: {{ include "home-assistant.fullname" . }}
          port: {{ .Values.service.port }}
      middlewares:
        - name: redirect-https
          namespace: traefik
{{- end }}
