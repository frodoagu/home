# HA package: split-AC climate entities (SmartIR + Broadlink IR).
#
# Versioned config that HA merges via `homeassistant: packages:`. Rendered into
# the {{ fullname }}-packages ConfigMap and mounted read-only at /config/packages.
# See docs/home-assistant.md ("Air conditioners"). No secrets here — device codes,
# entity ids and private LAN references only.

# Activates the SmartIR custom component (installed via HACS). Shared by the AC
# climate entities here and the TV IR media_players in tv.yaml.
smartir:

climate:
  - platform: smartir
    name: "Aire Living"
    unique_id: aire_living
    device_code: 1382  # Midea MSY-12HRDN1 (BGH Silent Air)
    controller_data: remote.control_living
    temperature_sensor: sensor.atc_29a8_temperatura
    humidity_sensor: sensor.atc_29a8_humedad
  - platform: smartir
    name: "Aire Dormitorio"
    unique_id: aire_dormitorio
    device_code: 5140  # Mitsubishi Electric MSC-A12WV (compatible con el Philco físico)
    controller_data: remote.control_dormitorio
    temperature_sensor: sensor.dormitorio_atc_b6d2_temperatura
    humidity_sensor: sensor.dormitorio_atc_b6d2_humedad
  - platform: smartir
    name: "Aire Cocina"
    unique_id: aire_cocina
    device_code: 1382  # Midea MSY-12HRDN1 (BGH Silent Air) - mismo equipo que el living
    controller_data: remote.broadlink_cocina

# Escenas de acceso rápido para los aires. Aparecen como entidades script.*
# (botones en la app HA / cards del dashboard) y, al estar `script` en
# googleAssistant.exposedDomains, también como escenas en Google Home.
# Encender fija modo+temperatura en UNA llamada (climate.set_temperature con
# hvac_mode): con IR cada envío manda el frame completo, así un solo blast deja
# el equipo en el estado deseado. Apagar usa climate.turn_off.
script:
  aires_todos_encender:
    alias: Aires - Encender todos (calor 21)
    icon: mdi:air-conditioner
    sequence:
      - action: climate.set_temperature
        target:
          entity_id:
            - climate.aire_living
            - climate.aire_dormitorio
            - climate.aire_cocina
        data:
          hvac_mode: heat
          temperature: 21
    mode: single

  aires_todos_frio:
    alias: Aires - Encender todos (frío 24)
    icon: mdi:snowflake
    sequence:
      - action: climate.set_temperature
        target:
          entity_id:
            - climate.aire_living
            - climate.aire_dormitorio
            - climate.aire_cocina
        data:
          hvac_mode: cool
          temperature: 24
    mode: single

  aires_solo_pieza:
    alias: Aires - Solo la pieza (calor 21)
    icon: mdi:bed
    sequence:
      - action: climate.turn_off
        target:
          entity_id:
            - climate.aire_living
            - climate.aire_cocina
      - action: climate.set_temperature
        target:
          entity_id: climate.aire_dormitorio
        data:
          hvac_mode: heat
          temperature: 21
    mode: single

  aires_todos_apagar:
    alias: Aires - Apagar todos
    icon: mdi:air-conditioner
    sequence:
      - action: climate.turn_off
        target:
          entity_id:
            - climate.aire_living
            - climate.aire_dormitorio
            - climate.aire_cocina
    mode: single
