# Default values for home-assistant.
# Adjust these to match your environment.

replicaCount: 1

image:
  repository: ghcr.io/home-assistant/home-assistant
  pullPolicy: IfNotPresent
  # Pin to an explicit version for reproducible deploys. Bump deliberately
  # (also update Chart.yaml appVersion). Avoid floating tags like "stable".
  tag: "2026.6.4"

nameOverride: ""
fullnameOverride: ""

# Home Assistant runs on port 8123
service:
  type: ClusterIP
  port: 8123

# Persistent storage for /config
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi
  # Optionally set an existing PVC name to use
  existingClaim: ""

# Ingress via Traefik IngressRoute
ingress:
  enabled: true
  # Hostname for the Home Assistant UI
  host: home.agu.com.ar
  # TLS certificate resolver name configured in the Traefik chart (see charts/traefik)
  certResolver: letsencrypt
  # Additional Traefik middlewares to attach (e.g. auth, rate-limit)
  middlewares: []

# Home Assistant external URL – tells HA its canonical public HTTPS URL.
# Prevents redirect loops when behind a reverse proxy (Traefik).
# If unset, Home Assistant creates this from the ingress.host value.
externalUrl: "https://home.agu.com.ar"

# Google Assistant / Google Home integration (manual `google_assistant`, not
# Nabu Casa). Set up as a Cloud-to-cloud integration in the Google Home Developer
# Console (https://console.home.google.com), optionally with a HomeGraph
# service-account key for report_state/request_sync. See docs/google-assistant.md
# for the full one-time setup runbook.
#
# NOTE: the init container writes the `google_assistant:` block into
# configuration.yaml only once (it won't rewrite an existing block). To change
# these settings after first sync, edit the block in /config/configuration.yaml
# (or delete it and let the init container regenerate it) and restart the pod.
googleAssistant:
  enabled: true
  # Project ID from the Google Home Developer Console / Google Cloud project.
  projectId: "growserver"
  # Proactively push state changes to Google. Only takes effect when a service
  # account is configured below (report_state needs HomeGraph credentials).
  reportState: true
  # Expose all supported entities by default. Narrow per-entity in the HA UI
  # (Settings → Voice assistants → Google Assistant) once linked.
  exposeByDefault: true
  exposedDomains:
    - light
    - switch
    - fan
    - cover
    - climate
    - scene
    - script
    - media_player
    - vacuum
    - lock
  # Optional PIN Google must speak before actuating "secure" devices (locks,
  # garage doors, ...). Leave empty to disable.
  secureDevicesPin: ""
  # HomeGraph service-account JSON. OPTIONAL: leave secretName empty to run
  # without it (account linking and device control still work; only report_state
  # and request_sync are unavailable). To enable it, create the Secret in this
  # namespace out-of-band (sensitive — never in git) and set secretName:
  #   kubectl create secret generic ha-google-sa -n home-assistant \
  #     --from-file=service_account.json=/path/to/homegraph-key.json
  # When set, the key is mounted at /config/google_assistant_sa.json and the
  # generated config references it via `service_account: !include`.
  serviceAccount:
    secretName: "ha-google-sa"
    secretKey: "service_account.json"

# HACS (Home Assistant Community Store) bootstrap.
# The init container installs HACS into /config/custom_components only if it is
# missing, so existing installs are not rewritten.
hacs:
  enabled: true
  # Pin to a concrete HACS release tag from github.com/hacs/integration.
  version: "2.0.5"

# Resource requests/limits – tune for RPi
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Allow Home Assistant to use the host network for device discovery (mDNS, etc.)
# Required for Zeroconf/mDNS (224.0.0.251) and SSDP (239.255.255.250) multicast
# discovery, which cannot cross the pod overlay network into the physical LAN.
hostNetwork: true

# Container security context. NET_ADMIN/NET_RAW are required by HA's Bluetooth
# integration to manage the adapter (active scanning, adapter recovery).
securityContext:
  capabilities:
    add:
      - NET_ADMIN
      - NET_RAW

# Node selector – useful to pin HA to a specific node
nodeSelector: {}

tolerations: []

affinity: {}

# Extra environment variables
env:
  - name: TZ
    value: "UTC"

# Extra volume mounts (e.g. to expose USB/Z-Wave sticks)
# The host D-Bus socket is mounted so Home Assistant's Bluetooth integration can
# talk to the host BlueZ daemon. Requires hostNetwork: true and bluetooth/bluez
# running on the node. Active scanning may additionally need NET_ADMIN/NET_RAW.
extraVolumes:
  - name: dbus
    hostPath:
      path: /run/dbus
      type: Directory
extraVolumeMounts:
  - name: dbus
    mountPath: /run/dbus
    readOnly: true
