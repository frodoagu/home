apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "homepage.fullname" . }}-config
  labels:
    {{- include "homepage.labels" . | nindent 4 }}
data:
  # Each key is mounted as /app/config/<key>. Homepage reads these on start.
  settings.yaml: |
    {{- toYaml .Values.config.settings | nindent 4 }}
  services.yaml: |
    {{- toYaml .Values.config.services | nindent 4 }}
  widgets.yaml: |
    {{- toYaml .Values.config.widgets | nindent 4 }}
  bookmarks.yaml: |
    {{- toYaml .Values.config.bookmarks | nindent 4 }}
  kubernetes.yaml: |
    {{- toYaml .Values.config.kubernetes | nindent 4 }}
  docker.yaml: |
    {{- toYaml .Values.config.docker | nindent 4 }}
  proxmox.yaml: |
    {{- toYaml .Values.config.proxmox | nindent 4 }}
  # custom.css / custom.js MUST exist as files: on startup homepage copies its
  # skeleton versions into /app/config, which fails (EROFS → crash) on our
  # read-only ConfigMap mount. Shipping them here pre-empts that copy.
  custom.css: |
{{ .Values.config.customCSS | indent 4 }}
  custom.js: |
{{ .Values.config.customJS | indent 4 }}
