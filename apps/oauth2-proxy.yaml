---
# ArgoCD Application – oauth2-proxy Google OAuth2 ForwardAuth backend.
# Provides the google-auth Traefik middleware used by the dashboard and other
# protected services.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oauth2-proxy
  namespace: argocd
  annotations:
    link.argocd.argoproj.io/external-link: "https://auth.agu.com.ar"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:frodoagu/home.git
    targetRevision: HEAD
    path: charts/oauth2-proxy
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: oauth2-proxy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
