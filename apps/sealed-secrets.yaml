---
# ArgoCD Application – Bitnami Sealed Secrets controller (lets encrypted secrets
# live in git, decrypted in-cluster). Deployed into kube-system as
# `sealed-secrets-controller` so `kubeseal` works with zero flags.
# See charts/sealed-secrets.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:frodoagu/home.git
    targetRevision: HEAD
    path: charts/sealed-secrets
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # The SealedSecret CRD ships with this chart; server-side apply avoids the
      # client-side "metadata.annotations too long" error on CRD updates.
      - ServerSideApply=true
