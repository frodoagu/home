---
# ArgoCD Application – homepage (gethomepage) dashboard / start page for the lab.
# See charts/homepage.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homepage
  namespace: argocd
  annotations:
    link.argocd.argoproj.io/external-link: "https://dash.agu.com.ar"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:frodoagu/home.git
    targetRevision: HEAD
    path: charts/homepage
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: homepage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
