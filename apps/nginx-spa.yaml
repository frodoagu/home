---
# ArgoCD Application – nginx serving a single-page application (SPA).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-spa
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  # NOTE: image auto-updates for this app are configured via an ImageUpdater CR
  # (charts/argocd-image-updater/templates/nginx-spa-imageupdater.yaml), not via
  # annotations — the v1.x Image Updater controller only reconciles CRs.
spec:
  project: default
  source:
    repoURL: git@github.com:frodoagu/home.git
    targetRevision: HEAD
    path: charts/nginx-spa
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-spa
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
