---
# ArgoCD Application – nginx serving a single-page application (SPA).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-spa
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Argo CD Image Updater: track the digest of the mutable `latest` tag that CI
    # pushes, and write the pinned `latest@sha256:...` back into the chart values
    # via git. See charts/argocd-image-updater.
    argocd-image-updater.argoproj.io/image-list: spa=ghcr.io/frodoagu/home-site
    argocd-image-updater.argoproj.io/spa.update-strategy: digest
    argocd-image-updater.argoproj.io/spa.allow-tags: regexp:^latest$
    argocd-image-updater.argoproj.io/spa.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/spa.helm.image-tag: image.tag
    # Write-back over HTTPS using the git-creds secret (PAT with repo scope).
    # The app's repoURL is SSH, so override it to HTTPS for the push.
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/git-creds
    argocd-image-updater.argoproj.io/git-repository: https://github.com/frodoagu/home.git
    argocd-image-updater.argoproj.io/write-back-target: helmvalues:./charts/nginx-spa/values.yaml
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: default
  source:
    repoURL: git@github.com:frodoagu/home.git
    targetRevision: HEAD
    path: charts/nginx-spa
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-spa
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
