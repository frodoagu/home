---
# ArgoCD Application – configures the k3s-bundled Traefik (ACME, dashboard, auth)
# via a HelmChartConfig. Traefik itself is installed by k3s, not this app.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    link.argocd.argoproj.io/external-link: "https://traefik.agu.com.ar"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:frodoagu/home.git
    targetRevision: HEAD
    path: charts/traefik-config
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    # Must match the namespace where the k3s-bundled Traefik runs.
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
