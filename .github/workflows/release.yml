name: 🏷️ Release · Auto Tag & Release

# Auto-bump on every push to main: derive the next semver tag from the
# Conventional Commit messages since the last tag (feat → minor, fix → patch,
# BREAKING CHANGE → major), create the tag, and publish a GitHub release with
# auto-generated notes.
#
# `default_bump: false` means commits that don't map to a bump — build:, chore:,
# docs:, and the Argo CD Image Updater's automated `build: automatic update…`
# write-backs — produce NO tag and NO release. So `main` is *evaluated* on every
# push, but only feat/fix/breaking changes actually cut a release.
#
# These tags are bookkeeping/changelog only — NOTHING deploys off them. ArgoCD
# still syncs main directly and the SPA image still updates by digest.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # create tags + releases

# Serialize releases so two near-simultaneous pushes don't race to compute the
# same "next" tag. Queue rather than cancel — we don't want to drop a release.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Tag & release
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for semver computation

      - name: 🏷️ Compute & create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main
          tag_prefix: v
          # Only conventional feat/fix/breaking commits bump. Flip to `patch`
          # if you'd rather cut a release on every push to main.
          default_bump: false

      - name: 🚀 Publish GitHub release
        if: steps.tag.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          # Conventional-commit changelog (categorized Features/Bug Fixes/…),
          # derived from the commit messages since the previous tag — not
          # GitHub's auto-generated PR notes.
          body: ${{ steps.tag.outputs.changelog }}

      - name: 📦 Release summary
        if: always()
        run: |
          {
            echo "## 🏷️ Release"
            echo ""
            if [ -n "${{ steps.tag.outputs.new_tag }}" ]; then
              echo "✅ Cut **${{ steps.tag.outputs.new_tag }}** (\`${{ steps.tag.outputs.release_type }}\` bump from \`${{ steps.tag.outputs.previous_tag }}\`)."
              echo ""
              echo "[View release](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.tag.outputs.new_tag }})"
            else
              echo "ℹ️ No conventional \`feat:\`/\`fix:\`/\`BREAKING CHANGE\` commits since the last tag — nothing released."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
