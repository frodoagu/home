name: build-site

# Build the agu.com.ar SPA into a container image and push it to GHCR as
# `latest` (plus an immutable `sha-<commit>` tag for traceability). Argo CD
# Image Updater watches `latest`'s digest and writes the pinned digest back to
# the nginx-spa chart, which rolls out the new version. CI does not touch git.
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/site.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/frodoagu/home-site

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # to checkout the (private) repo
      packages: write # to push to GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "sha=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        # Needed to cross-build the arm64 image on amd64 runners (the k3s node
        # is a Raspberry Pi / arm64).
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./site
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
