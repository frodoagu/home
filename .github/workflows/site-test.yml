name: test-site

# Lint-by-build + unit/component tests for the agu.com.ar SPA. Runs on PRs and
# on pushes, but only when the site source changes. The image build
# (site.yml) is separate and still gated on push to main.
on:
  push:
    paths:
      - "site/**"
      - ".github/workflows/site-test.yml"
  pull_request:
    paths:
      - "site/**"
      - ".github/workflows/site-test.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build (typecheck-by-bundle)
        run: npm run build
